events {}
http {
  server {
    listen 80;

    location /api/ai/ {
      proxy_pass http://ai-engine:8000/;
    }

    location /api/memory/ {
      proxy_pass http://memory-engine:8001/;
    }

    location /api/wallet/ {
      proxy_pass http://wallet-engine:8002/;
    }

    location / {
      proxy_pass http://dashboard:3000/;
    }
  }
}