version: '3.9'
services:
  nginx:
    image: nginx:latest
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - ai-engine
      - memory-engine
      - wallet-engine
      - dashboard

  dashboard:
    build: ./apps/dashboard
    ports:
      - "3000:3000"

  ai-engine:
    build: ./services/ai-engine
    env_file:
      - .env

  memory-engine:
    build: ./services/memory-engine

  wallet-engine:
    build: ./services/wallet-engine

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: voltex
      POSTGRES_PASSWORD: voltex
      POSTGRES_DB: voltex
